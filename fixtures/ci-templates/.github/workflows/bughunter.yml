name: BugHunter

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read
  security-events: write  # required for gh code-scanning upload-sarif

jobs:
  bughunter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run BugHunter CI
        env:
          BUGHUNTER_BASE_URL: ${{ secrets.BUGHUNTER_BASE_URL }}
          BUGHUNTER_ROLES: ${{ secrets.BUGHUNTER_ROLES }}
        run: |
          npx bughunter ci \
            --fail-on major+ \
            --report bughunter.sarif \
            --summary-md $GITHUB_STEP_SUMMARY

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bughunter.sarif
          category: bughunter
