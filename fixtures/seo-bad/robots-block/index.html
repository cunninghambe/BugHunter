<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Robots Blocked</title>
  <meta name="description" content="Page with noindex meta but reachable via crawl">
  <!-- noindex + nofollow on a crawlable page — triggers seo_robots_blocking_crawl -->
  <meta name="robots" content="noindex, nofollow">
</head>
<body>
  <h1>Robots Blocked Page</h1>
  <p>This page tells robots not to index it but is still reachable via the crawl.</p>
</body>
</html>
