<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Unlabeled Input Fixture</title>
</head>
<body>
  <h1>Dashboard</h1>
  <form>
    <!-- No associated label — axe label violation -->
    <input type="text" name="search" placeholder="Search...">
    <select name="filter">
      <option value="">All</option>
      <option value="active">Active</option>
    </select>
    <button type="submit">Go</button>
  </form>
</body>
</html>
