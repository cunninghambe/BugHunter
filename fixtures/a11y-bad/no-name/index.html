<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Element Without Accessible Name</title>
</head>
<body>
  <h1>Buttons and Links Without Accessible Name</h1>
  <!-- Empty button — no text, no aria-label, no aria-labelledby, no title -->
  <button class="primary"></button>
  <!-- Empty anchor with href — no accessible name -->
  <a href="/dest" class="link-empty"></a>
</body>
</html>
